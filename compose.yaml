# Build-from-source compose file (development / self-built deployments).
# For the prebuilt image, use deploy/docker-compose.yml instead.
services:
  tldraw:
    build: .
    container_name: tldraw
    restart: always
    ports:
      - 3000:3000
    volumes:
      - tldraw_sync_data:/data
    labels:
      - com.centurylinklabs.watchtower.enable=false
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M
volumes:
  tldraw_sync_data:
    name: tldraw_sync_data
