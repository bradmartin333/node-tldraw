services:
  tldraw:
    build: .
    container_name: tldraw_app
    restart: always
    depends_on:
      - sync
    env_file:
      - .env.local
    environment:
      - VITE_SYNC_HTTP_URL=${VITE_SYNC_HTTP_URL:-}
      - VITE_SYNC_WS_URL=${VITE_SYNC_WS_URL:-}
      - VITE_SYNC_WRITE_TOKEN=${SYNC_WRITE_TOKEN:-}
    ports:
      - "3000:3000"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M
  sync:
    build: .
    container_name: tldraw_sync
    restart: always
    command: npm run sync-server
    env_file:
      - .env.local
    environment:
      - SYNC_WRITE_TOKEN=${SYNC_WRITE_TOKEN:-}
    ports:
      - "8787:8787"
    volumes:
      - tldraw_sync_data:/data
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    deploy:
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M

volumes:
  tldraw_sync_data:
    name: tldraw_sync_data
