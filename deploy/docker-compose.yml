services:
  tldraw:
    image: bradmartin333/node-tldraw:latest
    container_name: tldraw
    restart: always
    ports:
      - 3000:3000
      - 8787:8787
    # Copy .env.example to .env and edit the values
    env_file:
      - path: .env
        required: false
    volumes:
      - tldraw_sync_data:/data
    # Custom logos (See README.md for details)
    # configs:
    #   - source: logo_light
    #     target: /app/dist/assets/light.webp
    #   - source: logo_dark
    #     target: /app/dist/assets/dark.webp

volumes:
  tldraw_sync_data:
